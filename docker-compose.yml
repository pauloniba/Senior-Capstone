services:
  db:
    # TimescaleDB on PostgreSQL 16 for time-series retention/rollups.
    image: timescale/timescaledb:latest-pg16
    restart: always
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mydatabase"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 45s
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

  backend:
    build: ./backend
    restart: always
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DATABASE_URL: postgresql://user:password@db:5432/mydatabase
    depends_on:
      db:
        condition: service_healthy

  fake_data:
    build: ./backend
    restart: always
    command: npm run fake-readings
    environment:
      API_BASE_URL: http://backend:3001
      FAKE_INTERVAL_MS: 10000
      DATABASE_URL: postgresql://user:password@db:5432/mydatabase
    depends_on:
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
